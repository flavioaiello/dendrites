<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" fill="none">
  <defs>
    <!-- Neural glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <!-- Synapse gradient -->
    <linearGradient id="synapse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <!-- Node accent -->
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background glow behind the graph -->
  <circle cx="70" cy="70" r="65" fill="url(#glow)"/>

  <!-- ── Dendrite graph (stylised neuron branches) ── -->
  <!-- Synaptic edges -->
  <line x1="70" y1="70" x2="28" y2="28" stroke="url(#synapse)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="70" y1="70" x2="112" y2="24" stroke="url(#synapse)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="70" y1="70" x2="120" y2="70" stroke="url(#synapse)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="70" y1="70" x2="108" y2="116" stroke="url(#synapse)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="70" y1="70" x2="28" y2="112" stroke="url(#synapse)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="70" y1="70" x2="20" y2="70" stroke="url(#synapse)" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <!-- Secondary branches -->
  <line x1="28" y1="28" x2="10" y2="10" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="28" y1="28" x2="48" y2="10" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="112" y1="24" x2="130" y2="8" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="120" y1="70" x2="138" y2="58" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="120" y1="70" x2="138" y2="82" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="108" y1="116" x2="126" y2="132" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="28" y1="112" x2="10" y2="130" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

  <!-- Tertiary tips -->
  <circle cx="10"  cy="10"  r="2" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="48"  cy="10"  r="2" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="130" cy="8"   r="2" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="138" cy="58"  r="2" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="138" cy="82"  r="2" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="126" cy="132" r="2" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="10"  cy="130" r="2" fill="#2dd4bf" opacity="0.6"/>

  <!-- Primary nodes -->
  <circle cx="28"  cy="28"  r="4.5" fill="url(#nodeGrad)"/>
  <circle cx="112" cy="24"  r="4.5" fill="url(#nodeGrad)"/>
  <circle cx="120" cy="70"  r="4.5" fill="url(#nodeGrad)"/>
  <circle cx="108" cy="116" r="4.5" fill="url(#nodeGrad)"/>
  <circle cx="28"  cy="112" r="4.5" fill="url(#nodeGrad)"/>
  <circle cx="20"  cy="70"  r="3.5" fill="url(#nodeGrad)"/>

  <!-- Soma (central node) -->
  <circle cx="70" cy="70" r="8" fill="#7c3aed"/>
  <circle cx="70" cy="70" r="5" fill="#c4b5fd"/>

  <!-- ── Wordmark ── -->
  <text x="160" y="82" font-family="'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif" font-size="48" font-weight="700" letter-spacing="-1" fill="#1e1b4b">
    dendrites
  </text>

  <!-- Tagline -->
  <text x="162" y="106" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="400" letter-spacing="0.5" fill="#6d28d9" opacity="0.85">
    Domain Model Context Protocol
  </text>
</svg>
